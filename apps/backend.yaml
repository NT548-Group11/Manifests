apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: devops-dev
spec:
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: noseyug/gymflex-backend:v109
        ports:
        - containerPort: 5000
        env:
        - name: MONGO_URI
          value: "mongodb://mongodb-service:27017/nt548_db"
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: devops-dev
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000
